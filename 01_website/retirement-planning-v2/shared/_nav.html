<!-- ============================================================
   BLOCK: GLOBAL NAV
   Usage: Copy-paste into any page. Update href on .nav-logo if needed.
   To change CTA link: update href on .nav-cta
   ============================================================ -->
<style>
/* ── NAV BLOCK ── */
.site-nav {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--navy);
  padding: 0 var(--section-padding-x);
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
}
.nav-logo { display: flex; align-items: center; flex-shrink: 0; }
.nav-logo img { display: block; width: auto; height: 62px; }

.nav-links {
  display: flex;
  align-items: center;
  gap: var(--space-8);
}
.nav-links a {
  color: var(--text-muted);
  font-size: var(--font-size-sm);
  font-weight: 500;
  transition: color var(--transition-fast);
  padding: var(--space-2) 0;
}
.nav-links a:hover { color: var(--gold); }

.nav-cta {
  background: var(--gold);
  color: var(--navy);
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  font-weight: 800;
  transition: background var(--transition-fast);
  flex-shrink: 0;
}
.nav-cta:hover { background: var(--gold-dark); }

/* Mobile hamburger */
.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: var(--space-2);
  background: none;
  border: none;
}
.nav-toggle span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
  transition: all var(--transition-base);
}

@media (max-width: 768px) {
  .site-nav { padding: 0 20px; height: 60px; }
  .nav-links {
    display: none;
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    background: var(--navy-deep);
    flex-direction: column;
    padding: var(--space-6) var(--space-6);
    gap: var(--space-5);
    border-top: 1px solid rgba(255,255,255,0.08);
    box-shadow: var(--shadow-lg);
  }
  .nav-links.open { display: flex; }
  .nav-links a { font-size: var(--font-size-base); color: var(--white); }
  .nav-logo img { height: 48px; }
  .nav-toggle { display: flex; }
  .nav-cta { font-size: 0.8rem; padding: 8px 16px; }
}
</style>

<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <a href="index.html" class="nav-logo" aria-label="Evermore Life home">
    <img src="../assets/evermorelife-llc-logo-nav.png" alt="Evermore Life LLC" />
  </a>

  <ul class="nav-links" id="navLinks" role="list">
    <li><a href="index.html#products">Products</a></li>
    <li><a href="index.html#how-it-works">How It Works</a></li>
    <li><a href="index.html#why-us">Why Us</a></li>
    <li><a href="optin.html" class="nav-cta" style="background:transparent;color:var(--gold);padding:0;font-size:var(--font-size-sm);">Strategy Review</a></li>
  </ul>

  <a href="optin.html" class="nav-cta" aria-label="Request a free strategy review">Free Review →</a>

  <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<script>
(function() {
  var toggle = document.getElementById('navToggle');
  var links  = document.getElementById('navLinks');
  if (!toggle || !links) return;
  toggle.addEventListener('click', function() {
    var open = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open);
  });
  // Close on link click
  links.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function() {
      links.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });
})();
</script>
<!-- END BLOCK: GLOBAL NAV -->
