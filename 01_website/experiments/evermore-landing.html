<style>
  :root {
    --navy: #1B2E5E;
    --navy-dark: #111D3F;
    --navy-light: #243d7a;
    --gold: #C8943A;
    --gold-light: #E0AD56;
    --gold-pale: #FBF0DC;
    --cream: #FAF7F1;
    --cream-dark: #F2EDE3;
    --text: #1C1C1E;
    --text-muted: #555F70;
    --white: #FFFFFF;
    --border: #DDD5C8;
    --success: #2E7D52;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); font-size: 18px; color: var(--text); background: var(--cream); -webkit-font-smoothing: antialiased; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .fade-up   { animation: fadeUp 0.7s ease forwards; }
  .fade-up-2 { animation: fadeUp 0.7s 0.15s ease both; }
  .fade-up-3 { animation: fadeUp 0.7s 0.3s ease both; }
  .fade-up-4 { animation: fadeUp 0.7s 0.45s ease both; }

  .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 96px 0; }
  .section-sm { padding: 64px 0; }

  h1, h2, h3 { font-family: var(--font-display); font-weight: 600; line-height: 1.2; }
  h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); }
  h2 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); }
  h3 { font-size: 1.35rem; }
  p { line-height: 1.75; color: var(--text-muted); }

  .btn {
    display: inline-block; padding: 16px 36px; border-radius: 6px;
    font-family: var(--font-body); font-size: 1rem; font-weight: 600;
    letter-spacing: 0.02em; cursor: pointer; border: none;
    text-decoration: none; transition: all 0.2s ease;
  }
  .btn-gold { background: var(--gold); color: var(--white); box-shadow: 0 4px 20px rgba(200,148,58,0.35); }
  .btn-gold:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,148,58,0.45); }
  .btn-navy { background: var(--navy); color: var(--white); }
  .btn-navy:hover { background: var(--navy-light); transform: translateY(-2px); }
  .btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--navy); }
  .btn-outline:hover { background: var(--navy); color: var(--white); }

  /* Nav */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 0 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .nav-inner {
    max-width: 1140px; margin: 0 auto; height: 72px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo-icon {
    width: 44px; height: 44px; background: var(--navy); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .nav-logo-text .brand { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--navy); line-height: 1.1; }
  .nav-logo-text .sub { font-size: 0.72rem; font-weight: 500; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; }
  .nav-cta { display: flex; align-items: center; gap: 16px; }
  .nav-links-list { display: flex; gap: 28px; list-style: none; }
  .nav-links-list a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
  .nav-links-list a:hover { color: var(--gold); }
  @media (max-width: 900px) { .nav-links-list { display: none; } }
  @media (max-width: 640px) { .nav-cta .btn { display: none; } }

  /* Hero */
  .hero {
    background: var(--navy); position: relative; overflow: hidden; padding: 80px 0 100px;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 50%, rgba(200,148,58,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 10% 80%, rgba(100,140,255,0.08) 0%, transparent 60%);
  }
  .hero::after {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .hero-inner {
    max-width: 1140px; margin: 0 auto; padding: 0 24px;
    display: grid; grid-template-columns: 1fr 420px; gap: 64px;
    align-items: center; position: relative; z-index: 1;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(200,148,58,0.2); border: 1px solid rgba(200,148,58,0.4);
    color: var(--gold-light); font-size: 0.82rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 100px; margin-bottom: 24px;
  }
  .hero h1 { color: var(--white); margin-bottom: 20px; }
  .hero h1 em { color: var(--gold-light); font-style: normal; }
  .hero-sub { color: rgba(255,255,255,0.72); font-size: 1.15rem; line-height: 1.7; margin-bottom: 36px; }
  .hero-bullets { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
  .hero-bullets li { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.85); font-size: 1rem; }
  .check-icon {
    width: 22px; height: 22px; border-radius: 50%; background: var(--gold);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .hero-phone { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.65); font-size: 0.92rem; }
  .hero-phone a { color: var(--gold-light); font-weight: 600; text-decoration: none; }
  .hero-phone a:hover { text-decoration: underline; }
  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; }

  /* Lead Form Card */
  .lead-form-card { background: var(--white); border-radius: 16px; padding: 40px 36px; box-shadow: 0 24px 80px rgba(0,0,0,0.35); }
  .lead-form-card h3 { font-family: var(--font-display); color: var(--navy); font-size: 1.5rem; margin-bottom: 6px; }
  .lead-form-card .sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; }
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 6px; letter-spacing: 0.02em; }
  .form-field input, .form-field select {
    width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 1rem; color: var(--text); background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s; outline: none; -webkit-appearance: none;
  }
  .form-field input:focus, .form-field select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,148,58,0.18); background: var(--white); }
  .form-field input.error { border-color: #C0392B; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-submit { width: 100%; padding: 16px; font-size: 1.05rem; margin-top: 8px; border-radius: 8px; }
  .sms-consent-field { display:flex; align-items:flex-start; gap:9px; background:var(--cream); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin:4px 0 12px; font-size:0.72rem; line-height:1.45; color:var(--text-muted); }
  .sms-consent-field input { margin-top:3px; flex-shrink:0; accent-color:var(--gold); }
  .sms-consent-field a { color:var(--navy); font-weight:600; }
  .form-disclaimer { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-top: 12px; line-height: 1.5; }
  .form-disclaimer a { color: var(--navy); font-weight: 600; }
  .form-success { text-align: center; padding: 24px 0; }
  .form-success .check-big { width: 64px; height: 64px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .form-success h3 { color: var(--success); margin-bottom: 8px; }
  .form-success p { font-size: 0.95rem; }

  /* Trust Bar */
  .trust-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 28px 0; }
  .trust-items { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 40px; }
  .trust-item { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
  .trust-item svg { color: var(--gold); flex-shrink: 0; }

  /* Section Headers */
  .section-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .section-header { margin-bottom: 56px; }
  .section-header h2 { margin-bottom: 14px; color: var(--navy); }
  .section-header p { max-width: 600px; font-size: 1.05rem; }
  .section-header.center { text-align: center; }
  .section-header.center p { margin: 0 auto; }

  /* Products grid */
  .products { background: var(--cream); }
  .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .product-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 14px;
    padding: 36px 28px; transition: box-shadow 0.25s, transform 0.25s; overflow: hidden;
  }
  .product-card:hover { box-shadow: 0 12px 40px rgba(27,46,94,0.12); transform: translateY(-4px); }
  .product-img {
    width: 100%; height: 160px; object-fit: cover; border-radius: 8px;
    margin-bottom: 22px; background: var(--gold-pale);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .product-img-placeholder {
    width: 100%; height: 160px; border-radius: 8px; margin-bottom: 22px;
    background: linear-gradient(135deg, var(--gold-pale) 0%, var(--cream-dark) 100%);
    display: flex; align-items: center; justify-content: center;
    border: 1.5px dashed var(--border);
  }
  .product-img-placeholder span { font-size: 0.78rem; color: var(--text-muted); text-align: center; padding: 8px; line-height: 1.5; }
  .product-icon-wrap { width: 52px; height: 52px; background: var(--gold-pale); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
  .product-card h3 { color: var(--navy); margin-bottom: 10px; font-size: 1.2rem; }
  .product-card p { font-size: 0.93rem; line-height: 1.65; }
  @media (max-width: 900px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .products-grid { grid-template-columns: 1fr; } }

  /* Carriers */
  .carriers-section { background: var(--white); }
  .carriers-list { display: flex; flex-direction: column; gap: 16px; max-width: 700px; margin: 0 auto; }
  .carrier-card {
    background: var(--cream); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px 28px; display: flex; align-items: flex-start; justify-content: space-between; gap: 20px;
  }
  .carrier-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 5px; }
  .carrier-info { flex: 1; }
  .carrier-name { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
  .carrier-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; }
  .carrier-badge {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); background: var(--gold-pale); border: 1px solid rgba(200,148,58,0.3);
    padding: 5px 12px; border-radius: 100px; white-space: nowrap; flex-shrink: 0;
  }
  .carrier-footer-note { text-align: center; margin-top: 20px; font-size: 0.82rem; color: var(--text-muted); font-style: italic; }

  /* How it works */
  .how-it-works { background: var(--navy); }
  .how-it-works .section-label { color: var(--gold-light); }
  .how-it-works .section-header h2 { color: var(--white); }
  .how-it-works .section-header p { color: rgba(255,255,255,0.65); }
  .steps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; position: relative; }
  .steps-grid::before {
    content: ''; position: absolute; top: 40px;
    left: calc(16.66% + 16px); right: calc(16.66% + 16px);
    height: 2px; background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%); opacity: 0.4;
  }
  .step { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 40px 32px; text-align: center; }
  .step-number { width: 54px; height: 54px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; color: var(--white); margin: 0 auto 24px; box-shadow: 0 4px 20px rgba(200,148,58,0.4); }
  .step h3 { color: var(--white); margin-bottom: 12px; }
  .step p { color: rgba(255,255,255,0.65); font-size: 0.95rem; }
  @media (max-width: 768px) { .steps-grid { grid-template-columns: 1fr; } .steps-grid::before { display: none; } }

  /* Testimonials */
  .testimonials { background: var(--white); }
  .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .testimonial-card { background: var(--cream); border: 1px solid var(--border); border-radius: 14px; padding: 36px 32px; }
  .quote-mark { font-family: var(--font-display); font-size: 5rem; color: var(--gold); line-height: 0.7; margin-bottom: 16px; opacity: 0.4; }
  .testimonial-text { font-size: 1rem; line-height: 1.75; color: var(--text); margin-bottom: 24px; font-style: italic; }
  .testimonial-author { display: flex; align-items: center; gap: 14px; }
  .author-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: var(--white); font-size: 1.1rem; flex-shrink: 0; }
  .author-name { font-weight: 600; color: var(--navy); font-size: 0.95rem; }
  .author-detail { font-size: 0.8rem; color: var(--text-muted); }
  .stars { color: var(--gold); font-size: 1rem; margin-bottom: 4px; }
  @media (max-width: 768px) { .testimonials-grid { grid-template-columns: 1fr; } }

  /* FAQ */
  .faq { background: var(--cream); }
  .faq-list { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .faq-item { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .faq-question { width: 100%; text-align: left; padding: 24px 28px; background: none; border: none; font-family: var(--font-body); font-size: 1.05rem; font-weight: 600; color: var(--navy); cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 16px; transition: background 0.15s; }
  .faq-question:hover { background: var(--cream); }
  .faq-chevron { width: 24px; height: 24px; border-radius: 50%; background: var(--gold-pale); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.25s, background 0.2s; }
  .faq-item.open .faq-chevron { transform: rotate(180deg); background: var(--gold); }
  .faq-item.open .faq-chevron svg { stroke: white; }
  .faq-answer { padding: 0 28px; max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.25s; font-size: 0.98rem; color: var(--text-muted); line-height: 1.75; }
  .faq-item.open .faq-answer { max-height: 400px; padding: 0 28px 24px; }

  /* Bottom CTA */
  .bottom-cta { background: var(--navy); padding: 100px 0; position: relative; overflow: hidden; }
  .bottom-cta::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 80% at 50% 100%, rgba(200,148,58,0.15) 0%, transparent 70%); }
  .bottom-cta-inner { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 420px; gap: 64px; align-items: center; }
  .bottom-cta h2 { color: var(--white); margin-bottom: 16px; }
  .bottom-cta p { color: rgba(255,255,255,0.65); font-size: 1.05rem; margin-bottom: 36px; }
  .cta-contact { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .cta-phone-block { display: flex; align-items: center; gap: 10px; }
  .cta-phone-icon { width: 44px; height: 44px; background: rgba(200,148,58,0.2); border: 1px solid rgba(200,148,58,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cta-phone-label { font-size: 0.78rem; color: rgba(255,255,255,0.5); }
  .cta-phone-number { font-size: 1.3rem; font-weight: 700; color: var(--white); text-decoration: none; }
  .cta-phone-number:hover { color: var(--gold-light); }
  @media (max-width: 900px) { .bottom-cta-inner { grid-template-columns: 1fr; } }

  /* Footer */
  footer { background: var(--navy-dark); padding: 48px 0 32px; border-top: 1px solid rgba(255,255,255,0.08); }
  .footer-inner { display: flex; flex-direction: column; align-items: center; gap: 24px; text-align: center; }
  .footer-logo-text .brand { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--white); }
  .footer-logo-text .sub { font-size: 0.7rem; font-weight: 600; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; }
  .footer-links { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
  .footer-links a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.88rem; transition: color 0.15s; }
  .footer-links a:hover { color: var(--gold-light); }
  .footer-disclaimer { max-width: 820px; font-size: 0.72rem; color: rgba(255,255,255,0.3); line-height: 1.7; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 24px; }

  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
</style>

<script type="text/babel">
const { useState, useEffect } = React;

window.EVERMORE_CONFIG = window.EVERMORE_CONFIG || {
  ghlWebhookUrl: '',
  thankYouUrl: 'thank-you.html'

function getTrackingFields() {
  const params = new URLSearchParams(window.location.search);
  const tracking = {};
  ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(key => {
    const value = params.get(key);
    if (value) tracking[key] = value;
  });
  tracking.page_url = window.location.href;
  tracking.referrer = document.referrer || '';
  return tracking;
}

function isLocalPreview() {
  return window.location.protocol === 'file:' || ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
}

async function submitEvermoreLead(payload) {
  const webhook = window.EVERMORE_CONFIG.ghlWebhookUrl;
  if (!webhook) {
    if (isLocalPreview()) {
      const previewLeads = JSON.parse(localStorage.getItem('evermore_preview_leads') || '[]');
      previewLeads.push(payload);
      localStorage.setItem('evermore_preview_leads', JSON.stringify(previewLeads));
      return { preview: true };
    }
    throw new Error('Lead webhook is not connected yet. Add your GHL inbound webhook URL to EVERMORE_CONFIG.ghlWebhookUrl.');
  }
  const response = await fetch(webhook, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!response.ok) throw new Error('GHL webhook rejected the submission.');
  return response;
}

// Lead Form
function LeadForm() {
  const [form, setForm] = useState({ firstName:'', lastName:'', phone:'', email:'', age:'', coverage:'', smsConsent:false });
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.firstName.trim()) e.firstName = true;
    if (!form.lastName.trim()) e.lastName = true;
    if (!form.phone.match(/^\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{4}$/)) e.phone = true;
    if (!form.age) e.age = true;
    return e;
  };

  const handleSubmit = async (ev) => {
    ev.preventDefault();
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length === 0) {
      setLoading(true);
      const payload = {
        first_name: form.firstName.trim(),
        last_name: form.lastName.trim(),
        phone: form.phone.trim(),
        email: form.email.trim(),
        age: form.age,
        coverage_type: form.coverage,
        sms_consent: form.smsConsent ? 'yes' : 'no',
        sms_consent_text: form.smsConsent ? 'Optional SMS quote follow-up and appointment reminders. STOP to opt out. HELP for help. Consent is not a condition of purchase.' : '',
        sms_consent_timestamp: form.smsConsent ? new Date().toISOString() : '',
        source: 'evermorelife.org-react-landing',
        lead_type: 'life-insurance-quote',
        timestamp: new Date().toISOString(),
        ...getTrackingFields()
      };
      try {
        await submitEvermoreLead(payload);
        if (typeof fbq !== 'undefined') fbq('track', 'Lead', { content_name: 'Evermore React Landing Form' });
        if (typeof gtag !== 'undefined') gtag('event', 'generate_lead', { event_category: 'Lead', event_label: 'Evermore React Landing Form' });
        setSubmitted(true);
      } catch (error) {
        alert(error.message + ' If this is a live visitor, ask them to call or email Evermore Life directly.');
      } finally {
        setLoading(false);
      }
    }
  };

  if (submitted) return (
    <div className="form-success">
      <div className="check-big"><CheckIcon white /></div>
      <h3 style={{fontFamily:'var(--font-display)',color:'#2E7D52'}}>You're All Set!</h3>
      <p>A licensed Evermore Life agent will be in touch with you shortly.</p>
      <p style={{fontSize:'0.82rem',marginTop:8,color:'var(--text-muted)'}}>Check your email for a confirmation.</p>
    </div>
  );

  return (
    <form onSubmit={handleSubmit} noValidate>
      <div className="form-row">
        <div className="form-field">
          <label>First Name</label>
          <input type="text" placeholder="John" className={errors.firstName ? 'error' : ''} value={form.firstName} onChange={e => setForm({...form, firstName: e.target.value})} />
        </div>
        <div className="form-field">
          <label>Last Name</label>
          <input type="text" placeholder="Smith" className={errors.lastName ? 'error' : ''} value={form.lastName} onChange={e => setForm({...form, lastName: e.target.value})} />
        </div>
      </div>
      <div className="form-field">
        <label>Phone Number</label>
        <input type="tel" placeholder="(555) 000-0000" className={errors.phone ? 'error' : ''} value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
      </div>
      <div className="form-field">
        <label>Email Address <span style={{fontWeight:400,color:'var(--text-muted)'}}>(optional)</span></label>
        <input type="email" placeholder="john@example.com" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
      </div>
      <div className="form-row">
        <div className="form-field">
          <label>Age</label>
          <select className={errors.age ? 'error' : ''} value={form.age} onChange={e => setForm({...form, age: e.target.value})}>
            <option value="">Select...</option>
            {Array.from({length:68},(_,i)=>i+18).map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        <div className="form-field">
          <label>Coverage Interested In</label>
          <select value={form.coverage} onChange={e => setForm({...form, coverage: e.target.value})}>
            <option value="">Not sure yet</option>
            <option>Final Expense</option>
            <option>Term Life</option>
            <option>Indexed Universal Life (IUL)</option>
            <option>Whole Life</option>
            <option>Mortgage Protection</option>
          </select>
        </div>
      </div>
      <label className="sms-consent-field">
        <input type="checkbox" checked={form.smsConsent} onChange={e => setForm({...form, smsConsent: e.target.checked})} />
        <span>Optional: I agree to receive SMS messages from Evermore Life about my quote request and appointment reminders. Msg &amp; data rates may apply. Message frequency varies. Reply STOP to opt out, HELP for help. Consent is not a condition of purchase. <a href="../current/privacy.html">Privacy Policy</a> · <a href="../current/terms.html">Terms</a>.</span>
      </label>
      <button type="submit" className="btn btn-gold form-submit" disabled={loading}>
        {loading ? 'Submitting...' : 'Get My Free Quote'}
      </button>
      <p className="form-disclaimer">
        You can request a quote without agreeing to text messages. A licensed agent may contact you by phone or email about your request. We never sell your information.
      </p>
    </form>
  );
}
