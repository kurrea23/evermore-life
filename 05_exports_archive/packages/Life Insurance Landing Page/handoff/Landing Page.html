<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunrise Final Expense | Arizona Life Insurance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --navy: #1B2E5E;
    --navy-dark: #111D3F;
    --navy-light: #243d7a;
    --gold: #C8943A;
    --gold-light: #E0AD56;
    --gold-pale: #FBF0DC;
    --cream: #FAF7F1;
    --cream-dark: #F2EDE3;
    --text: #1C1C1E;
    --text-muted: #555F70;
    --white: #FFFFFF;
    --border: #DDD5C8;
    --success: #2E7D52;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    font-size: 18px;
    color: var(--text);
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .fade-up { animation: fadeUp 0.7s ease forwards; }
  .fade-up-2 { animation: fadeUp 0.7s 0.15s ease both; }
  .fade-up-3 { animation: fadeUp 0.7s 0.3s ease both; }
  .fade-up-4 { animation: fadeUp 0.7s 0.45s ease both; }

  /* Utility */
  .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 96px 0; }
  .section-sm { padding: 64px 0; }

  h1, h2, h3 { font-family: var(--font-display); font-weight: 600; line-height: 1.2; }
  h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); }
  h2 { font-size: clamp(1.8rem, 3.5vw, 2.6rem); }
  h3 { font-size: 1.35rem; }

  p { line-height: 1.75; color: var(--text-muted); }

  .btn {
    display: inline-block;
    padding: 16px 36px;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .btn-gold {
    background: var(--gold);
    color: var(--white);
    box-shadow: 0 4px 20px rgba(200,148,58,0.35);
  }
  .btn-gold:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,148,58,0.45); }
  .btn-navy {
    background: var(--navy);
    color: var(--white);
  }
  .btn-navy:hover { background: var(--navy-light); transform: translateY(-2px); }
  .btn-outline {
    background: transparent;
    color: var(--navy);
    border: 2px solid var(--navy);
  }
  .btn-outline:hover { background: var(--navy); color: var(--white); }

  /* Nav */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .nav-inner {
    max-width: 1140px;
    margin: 0 auto;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 44px;
    height: 44px;
    background: var(--navy);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .nav-logo-text .brand { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--navy); line-height: 1.1; }
  .nav-logo-text .sub { font-size: 0.72rem; font-weight: 500; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; }
  .nav-phone {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--navy);
    font-weight: 600;
    font-size: 1.1rem;
  }
  .nav-phone:hover { color: var(--gold); }
  .nav-cta { display: flex; align-items: center; gap: 16px; }

  @media (max-width: 640px) {
    .nav-cta .btn { display: none; }
    .nav-phone-label { display: none; }
  }

  /* Hero */
  .hero {
    background: var(--navy);
    position: relative;
    overflow: hidden;
    padding: 80px 0 100px;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 70% 50%, rgba(200,148,58,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 10% 80%, rgba(100,140,255,0.08) 0%, transparent 60%);
  }
  /* Subtle texture */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .hero-inner {
    max-width: 1140px;
    margin: 0 auto;
    padding: 0 24px;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 64px;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,148,58,0.2);
    border: 1px solid rgba(200,148,58,0.4);
    color: var(--gold-light);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  .hero h1 { color: var(--white); margin-bottom: 20px; }
  .hero h1 em { color: var(--gold-light); font-style: normal; }
  .hero-sub {
    color: rgba(255,255,255,0.72);
    font-size: 1.15rem;
    line-height: 1.7;
    margin-bottom: 36px;
  }
  .hero-bullets {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }
  .hero-bullets li {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.85);
    font-size: 1rem;
  }
  .check-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hero-phone {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.65);
    font-size: 0.92rem;
  }
  .hero-phone a { color: var(--gold-light); font-weight: 600; text-decoration: none; }
  .hero-phone a:hover { text-decoration: underline; }

  /* Lead Form Card */
  .lead-form-card {
    background: var(--white);
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.35);
  }
  .lead-form-card h3 {
    font-family: var(--font-display);
    color: var(--navy);
    font-size: 1.5rem;
    margin-bottom: 6px;
  }
  .lead-form-card .sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; }
  .form-field { margin-bottom: 16px; }
  .form-field label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .form-field input, .form-field select {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--text);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  .form-field input:focus, .form-field select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,148,58,0.18);
    background: var(--white);
  }
  .form-field input.error { border-color: #C0392B; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-submit { width: 100%; padding: 16px; font-size: 1.05rem; margin-top: 8px; border-radius: 8px; }
  .form-disclaimer { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-top: 12px; line-height: 1.5; }
  .form-success {
    text-align: center;
    padding: 24px 0;
  }
  .form-success .check-big {
    width: 64px; height: 64px;
    background: var(--success);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .form-success h3 { color: var(--success); margin-bottom: 8px; }
  .form-success p { font-size: 0.95rem; }

  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; }
    .lead-form-card { max-width: 480px; margin: 0 auto; }
  }

  /* Trust Bar */
  .trust-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 28px 0;
  }
  .trust-items {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 500;
  }
  .trust-item svg { color: var(--gold); flex-shrink: 0; }

  /* Section Headers */
  .section-label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .section-header { margin-bottom: 56px; }
  .section-header h2 { margin-bottom: 14px; color: var(--navy); }
  .section-header p { max-width: 600px; font-size: 1.05rem; }
  .section-header.center { text-align: center; }
  .section-header.center p { margin: 0 auto; }

  /* Benefits */
  .benefits { background: var(--cream); }
  .benefits-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }
  .benefit-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 32px;
    transition: box-shadow 0.25s, transform 0.25s;
  }
  .benefit-card:hover { box-shadow: 0 12px 40px rgba(27,46,94,0.12); transform: translateY(-4px); }
  .benefit-icon {
    width: 54px; height: 54px;
    background: var(--gold-pale);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
  }
  .benefit-card h3 { color: var(--navy); margin-bottom: 10px; }
  .benefit-card p { font-size: 0.95rem; }

  @media (max-width: 768px) {
    .benefits-grid { grid-template-columns: 1fr; }
  }
  @media (min-width: 640px) and (max-width: 768px) {
    .benefits-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* How It Works */
  .how-it-works { background: var(--navy); }
  .how-it-works .section-label { color: var(--gold-light); }
  .how-it-works .section-header h2 { color: var(--white); }
  .how-it-works .section-header p { color: rgba(255,255,255,0.65); }
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    position: relative;
  }
  .steps-grid::before {
    content: '';
    position: absolute;
    top: 40px;
    left: calc(16.66% + 16px);
    right: calc(16.66% + 16px);
    height: 2px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    opacity: 0.4;
  }
  .step {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 40px 32px;
    position: relative;
    text-align: center;
  }
  .step-number {
    width: 54px; height: 54px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--white);
    margin: 0 auto 24px;
    position: relative;
    z-index: 1;
    box-shadow: 0 4px 20px rgba(200,148,58,0.4);
  }
  .step h3 { color: var(--white); margin-bottom: 12px; }
  .step p { color: rgba(255,255,255,0.65); font-size: 0.95rem; }

  @media (max-width: 768px) {
    .steps-grid { grid-template-columns: 1fr; }
    .steps-grid::before { display: none; }
  }

  /* Coverage */
  .coverage { background: var(--cream-dark); }
  .plans-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    align-items: start;
  }
  .plan-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    transition: box-shadow 0.25s, transform 0.25s;
    position: relative;
  }
  .plan-card:hover { box-shadow: 0 16px 50px rgba(27,46,94,0.14); transform: translateY(-4px); }
  .plan-card.featured {
    border-color: var(--gold);
    box-shadow: 0 8px 40px rgba(200,148,58,0.2);
    transform: scale(1.03);
  }
  .plan-card.featured:hover { transform: scale(1.03) translateY(-4px); }
  .plan-badge {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--white);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .plan-name {
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .plan-amount {
    font-family: var(--font-display);
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }
  .plan-amount span { font-size: 1rem; font-weight: 400; color: var(--text-muted); }
  .plan-rate { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 28px; }
  .plan-features {
    list-style: none;
    text-align: left;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .plan-features li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.92rem;
    color: var(--text-muted);
  }
  .plan-features li::before {
    content: '';
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--gold-pale);
    border: 1.5px solid var(--gold);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='8' viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l2.5 2.5L9 1' stroke='%23C8943A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: center;
  }
  .plan-cta { width: 100%; }

  @media (max-width: 768px) {
    .plans-grid { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }
    .plan-card.featured { transform: scale(1); }
  }

  /* Testimonials */
  .testimonials { background: var(--white); }
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }
  .testimonial-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 32px;
    position: relative;
  }
  .quote-mark {
    font-family: var(--font-display);
    font-size: 5rem;
    color: var(--gold);
    line-height: 0.7;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .testimonial-text {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 24px;
    font-style: italic;
  }
  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .author-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--white);
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .author-name { font-weight: 600; color: var(--navy); font-size: 0.95rem; }
  .author-detail { font-size: 0.8rem; color: var(--text-muted); }
  .stars { color: var(--gold); font-size: 1rem; margin-bottom: 4px; }

  @media (max-width: 768px) {
    .testimonials-grid { grid-template-columns: 1fr; }
  }

  /* FAQ */
  .faq { background: var(--cream); }
  .faq-list { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .faq-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .faq-question {
    width: 100%;
    text-align: left;
    padding: 24px 28px;
    background: none;
    border: none;
    font-family: var(--font-body);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    transition: background 0.15s;
  }
  .faq-question:hover { background: var(--cream); }
  .faq-chevron {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--gold-pale);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.25s, background 0.2s;
  }
  .faq-item.open .faq-chevron { transform: rotate(180deg); background: var(--gold); }
  .faq-item.open .faq-chevron svg { stroke: white; }
  .faq-answer {
    padding: 0 28px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.25s;
    font-size: 0.98rem;
    color: var(--text-muted);
    line-height: 1.75;
  }
  .faq-item.open .faq-answer { max-height: 400px; padding: 0 28px 24px; }

  /* Bottom CTA */
  .bottom-cta {
    background: var(--navy);
    padding: 100px 0;
    position: relative;
    overflow: hidden;
  }
  .bottom-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 80% at 50% 100%, rgba(200,148,58,0.15) 0%, transparent 70%);
  }
  .bottom-cta-inner {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 64px;
    align-items: center;
  }
  .bottom-cta h2 { color: var(--white); margin-bottom: 16px; }
  .bottom-cta p { color: rgba(255,255,255,0.65); font-size: 1.05rem; margin-bottom: 36px; }
  .cta-contact {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .cta-phone-block {
    display: flex;

// ─── Icons ───────────────────────────────────────────────────────────────────

// ─── Lead Form ────────────────────────────────────────────────────────────────
function LeadForm({ compact }) {
  const [form, setForm] = useState({ firstName: '', lastName: '', phone: '', email: '', age: '', coverage: '' });
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.firstName.trim()) e.firstName = true;
    if (!form.lastName.trim()) e.lastName = true;
    if (!form.phone.match(/^\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{4}$/)) e.phone = true;
    if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = true;
    if (!form.age) e.age = true;
    return e;
  };

  const handleSubmit = (ev) => {
    ev.preventDefault();
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length === 0) {
      setLoading(true);
      setTimeout(() => {
        window.location.href = `Thank You.html?name=${encodeURIComponent(form.firstName)}`;
      }, 900);
    }
  };

  if (submitted) return (
    <div className="form-success">
      <div className="check-big"><CheckIcon white /></div>
      <h3 style={{fontFamily:'var(--font-display)',color:'#2E7D52'}}>You're All Set!</h3>
      <p>A licensed Arizona agent will call you within <strong>15 minutes</strong> during business hours.</p>
      <p style={{fontSize:'0.82rem',marginTop:8,color:'var(--text-muted)'}}>Check your email for a confirmation.</p>
    </div>
  );

  return (
    <form onSubmit={handleSubmit} noValidate>
      <div className="form-row">
        <div className="form-field">
          <label>First Name</label>
          <input type="text" placeholder="Mary" className={errors.firstName ? 'error' : ''} value={form.firstName} onChange={e => setForm({...form, firstName: e.target.value})} />
        </div>
        <div className="form-field">
          <label>Last Name</label>
          <input type="text" placeholder="Johnson" className={errors.lastName ? 'error' : ''} value={form.lastName} onChange={e => setForm({...form, lastName: e.target.value})} />
        </div>
      </div>
      <div className="form-field">
        <label>Phone Number</label>
        <input type="tel" placeholder="(602) 555-0100" className={errors.phone ? 'error' : ''} value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
      </div>
      <div className="form-field">
        <label>Email Address</label>
        <input type="email" placeholder="mary@example.com" className={errors.email ? 'error' : ''} value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
      </div>
      <div className="form-row">
        <div className="form-field">
          <label>Age</label>
          <select className={errors.age ? 'error' : ''} value={form.age} onChange={e => setForm({...form, age: e.target.value})}>
            <option value="">Select...</option>
            {Array.from({length:36},(_,i)=>i+50).map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        <div className="form-field">
          <label>Coverage Amount</label>
          <select value={form.coverage} onChange={e => setForm({...form, coverage: e.target.value})}>
            <option value="">Any amount</option>
            <option value="5000">$5,000</option>
            <option value="10000">$10,000</option>
            <option value="15000">$15,000</option>
            <option value="20000">$20,000</option>
            <option value="25000">$25,000</option>
          </select>
        </div>
      </div>
      <button type="submit" className="btn btn-gold form-submit" disabled={loading}>
        {loading ? 'Submitting...' : 'Get My Free Quote →'}
      </button>
      <p className="form-disclaimer">
        By submitting, you agree to be contacted by a licensed insurance agent. No obligation. We never sell your information.
      </p>
    </form>
  );
}

// ─── Tweaks Panel ─────────────────────────────────────────────────────────────
function TweaksPanel({ visible, onClose }) {
  const [accent, setAccent] = useState('gold');
  const [ctaText, setCtaText] = useState('Get My Free Quote →');
  const [heroStyle, setHeroStyle] = useState('dark');

  const accents = [
    { key: 'gold', color: '#C8943A' },
    { key: 'teal', color: '#1E7B7B' },
    { key: 'wine', color: '#7B2D3E' },
    { key: 'sage', color: '#4A6741' },
  ];

  useEffect(() => {
    const colorMap = { gold: '#C8943A', teal: '#1E7B7B', wine: '#7B2D3E', sage: '#4A6741' };
    const lightMap = { gold: '#E0AD56', teal: '#35A0A0', wine: '#9E3F55', sage: '#6A8D60' };
    const paleMap  = { gold: '#FBF0DC', teal: '#DCF3F3', wine: '#F3DCE1', sage: '#E1EBE0' };
    document.documentElement.style.setProperty('--gold', colorMap[accent]);
    document.documentElement.style.setProperty('--gold-light', lightMap[accent]);
    document.documentElement.style.setProperty('--gold-pale', paleMap[accent]);
  }, [accent]);

  useEffect(() => {
    const heroEl = document.querySelector('.hero');
    if (!heroEl) return;
    heroEl.style.background = heroStyle === 'dark' ? 'var(--navy)' : '#FAF7F1';
    const h1 = heroEl.querySelector('h1');
    if (h1) h1.style.color = heroStyle === 'dark' ? 'white' : 'var(--navy)';
    const sub = heroEl.querySelector('.hero-sub');
    if (sub) sub.style.color = heroStyle === 'dark' ? 'rgba(255,255,255,0.72)' : 'var(--text-muted)';
  }, [heroStyle]);

  useEffect(() => {
    document.querySelectorAll('.form-submit').forEach(btn => { btn.textContent = ctaText; });
  }, [ctaText]);

  if (!visible) return null;
  return (
    <div id="tweaks-panel" className="visible">
      <div className="tweaks-header">
        <h4>Tweaks</h4>
        <button className="tweaks-close" onClick={onClose}>✕</button>
      </div>
      <div className="tweaks-body">
        <div className="tweak-row">
          <label>Accent Color</label>
          <div className="tweak-color-row">
            {accents.map(a => (
              <div key={a.key} className={`tweak-color-swatch${accent === a.key ? ' active' : ''}`}
                style={{background: a.color}} onClick={() => setAccent(a.key)} title={a.key} />
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <label>Hero Background</label>
          <div className="tweak-options">
            {['dark','light'].map(opt => (
              <button key={opt} className={`tweak-opt${heroStyle === opt ? ' active' : ''}`} onClick={() => setHeroStyle(opt)}>
                {opt === 'dark' ? 'Dark Navy' : 'Light Cream'}
              </button>
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <label>CTA Button Text</label>
          <div className="tweak-options">
            {['Get My Free Quote →', 'Get a Free Rate', 'See My Options', 'Apply Now →'].map(opt => (
              <button key={opt} className={`tweak-opt${ctaText === opt ? ' active' : ''}`} onClick={() => setCtaText(opt)}>
                {opt}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

    return () => observer.disconnect();
