<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Confirmed | Sunrise Final Expense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --navy: #1B2E5E;
    --navy-dark: #111D3F;
    --navy-light: #243d7a;
    --gold: #C8943A;
    --gold-light: #E0AD56;
    --gold-pale: #FBF0DC;
    --cream: #FAF7F1;
    --cream-dark: #F2EDE3;
    --text: #1C1C1E;
    --text-muted: #555F70;
    --white: #FFFFFF;
    --border: #DDD5C8;
    --success: #2E7D52;
    --success-pale: #E6F4EC;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); font-size: 17px; color: var(--text); background: var(--cream); -webkit-font-smoothing: antialiased; }
  h1,h2,h3,h4 { font-family: var(--font-display); font-weight: 600; line-height: 1.2; }
  p { line-height: 1.75; color: var(--text-muted); }
  .container { max-width: 1060px; margin: 0 auto; padding: 0 24px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
  @keyframes tick { from { stroke-dashoffset: 283; } to { stroke-dashoffset: 0; } }
  .fade-up { animation: fadeUp 0.6s ease both; }
  .fade-up-2 { animation: fadeUp 0.6s 0.12s ease both; }
  .fade-up-3 { animation: fadeUp 0.6s 0.24s ease both; }
  .fade-up-4 { animation: fadeUp 0.6s 0.36s ease both; }

  /* Nav */
  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .nav-inner {
    max-width: 1060px; margin: 0 auto;
    height: 68px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .nav-logo-icon { width:40px; height:40px; background:var(--navy); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .nav-brand { font-family:var(--font-display); font-size:1.05rem; font-weight:700; color:var(--navy); }
  .nav-sub { font-size:0.68rem; font-weight:600; color:var(--gold); letter-spacing:0.12em; text-transform:uppercase; }
  .nav-phone { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--navy); font-weight:600; font-size:1rem; }
  .nav-phone:hover { color:var(--gold); }

  /* Hero Confirmation */
  .confirm-hero {
    background: var(--navy);
    padding: 64px 0 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .confirm-hero::before {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(200,148,58,0.14) 0%, transparent 70%);
  }
  .confirm-hero-inner { position:relative; z-index:1; }
  .confirm-badge {
    display:inline-flex; align-items:center; gap:10px;
    background: rgba(46,125,82,0.2); border:1px solid rgba(46,125,82,0.5);
    color:#6FCFA0; font-size:0.8rem; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    padding:6px 18px; border-radius:100px; margin-bottom:28px;
  }
  .confirm-check {
    width:80px; height:80px;
    background: var(--success);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    margin: 0 auto 28px;
    box-shadow: 0 8px 32px rgba(46,125,82,0.4);
    animation: pulse 2.5s ease-in-out infinite;
  }
  .confirm-hero h1 { color:var(--white); font-size:clamp(1.9rem,4vw,2.8rem); margin-bottom:14px; }
  .confirm-hero h1 em { color:var(--gold-light); font-style:normal; }
  .confirm-hero p { color:rgba(255,255,255,0.68); font-size:1.05rem; max-width:560px; margin:0 auto 40px; }

  /* Countdown */
  .countdown-card {
    display:inline-flex; align-items:center; gap:20px;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
    border-radius:16px; padding:20px 36px;
    margin-bottom:36px;
  }
  .countdown-ring { position:relative; width:70px; height:70px; flex-shrink:0; }
  .countdown-ring svg { transform:rotate(-90deg); }
  .countdown-ring circle { fill:none; stroke:rgba(200,148,58,0.2); stroke-width:5; }
  .countdown-ring .progress { stroke:var(--gold); stroke-width:5; stroke-linecap:round; stroke-dasharray:188; transition:stroke-dashoffset 1s linear; }
  .countdown-num {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; color:var(--white); font-size:1.3rem; line-height:1;
  }
  .countdown-num span { font-size:0.55rem; color:rgba(255,255,255,0.5); font-family:var(--font-body); font-weight:500; }
  .countdown-text { text-align:left; }
  .countdown-label { font-size:0.75rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold-light); margin-bottom:4px; }
  .countdown-desc { color:rgba(255,255,255,0.8); font-size:0.95rem; }

  /* Action Buttons */
  .action-row {
    display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap;
  }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:14px 28px; border-radius:8px; font-family:var(--font-body); font-size:0.95rem; font-weight:600; cursor:pointer; border:none; text-decoration:none; transition:all 0.2s ease; }
  .btn-call { background:var(--gold); color:var(--white); box-shadow:0 4px 20px rgba(200,148,58,0.4); }
  .btn-call:hover { background:var(--gold-light); transform:translateY(-2px); }
  .btn-calendar { background:rgba(255,255,255,0.1); color:var(--white); border:1.5px solid rgba(255,255,255,0.25); }
  .btn-calendar:hover { background:rgba(255,255,255,0.18); transform:translateY(-2px); }

  /* Main layout */
  .main-grid {
    max-width:1060px; margin:0 auto; padding:64px 24px;
    display:grid; grid-template-columns:1fr 400px; gap:48px; align-items:start;
  }
  @media(max-width:860px) { .main-grid { grid-template-columns:1fr; } }

  /* What to have ready */
  .card { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:40px; margin-bottom:28px; }
  .card-label { font-size:0.75rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
  .card h2 { font-size:1.5rem; color:var(--navy); margin-bottom:20px; }
  .ready-list { list-style:none; display:flex; flex-direction:column; gap:14px; }
  .ready-item { display:flex; align-items:flex-start; gap:14px; }
  .ready-icon {
    width:40px; height:40px; flex-shrink:0;
    background:var(--gold-pale); border-radius:10px;
    display:flex; align-items:center; justify-content:center;
  }
  .ready-item-text strong { display:block; font-weight:600; color:var(--navy); font-size:0.95rem; margin-bottom:2px; }
  .ready-item-text span { font-size:0.85rem; color:var(--text-muted); line-height:1.5; }

  /* Carriers */
  .carriers-card { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:32px 40px; }
  .carriers-card h4 { font-family:var(--font-display); font-size:1rem; color:var(--navy); margin-bottom:4px; }
  .carriers-card p { font-size:0.82rem; color:var(--text-muted); margin-bottom:20px; }
  .carrier-list { display:flex; flex-direction:column; gap:10px; }
  .carrier-chip {
    display:flex; align-items:center; gap:12px;
    padding:12px 16px; border-radius:10px;
    border:1px solid var(--border); background:var(--cream);
    font-size:0.9rem; font-weight:600; color:var(--navy);
  }
  .carrier-dot { width:10px; height:10px; border-radius:50%; background:var(--gold); flex-shrink:0; }

  /* Pre-App Form */
  .preapp-card { background:var(--white); border:1.5px solid var(--gold); border-radius:16px; padding:40px; box-shadow:0 8px 40px rgba(200,148,58,0.12); }
  .preapp-badge {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--gold); border:1px solid var(--gold);
    color:var(--white); font-size:0.73rem; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase;
    padding:6px 14px; border-radius:100px; margin-bottom:14px;
    box-shadow: 0 3px 12px rgba(200,148,58,0.35);
  }
  .preapp-card h2 { font-size:1.4rem; color:var(--navy); margin-bottom:8px; }
  .preapp-card > p { font-size:0.9rem; margin-bottom:28px; }
  .preapp-card { background: linear-gradient(160deg, #fffdf8 0%, #fff8ec 100%); }
  .form-field { margin-bottom:16px; }
  .form-field label { display:block; font-size:0.78rem; font-weight:600; color:var(--text); margin-bottom:6px; letter-spacing:0.02em; }
  .form-field input, .form-field select, .form-field textarea {
    width:100%; padding:12px 15px;
    border:1.5px solid var(--border); border-radius:8px;
    font-family:var(--font-body); font-size:0.95rem; color:var(--text);
    background:var(--cream); transition:border-color 0.2s, box-shadow 0.2s; outline:none; -webkit-appearance:none;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,148,58,0.15); background:var(--white);
  }
  .form-field textarea { resize:vertical; min-height:80px; }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .radio-group { display:flex; gap:10px; flex-wrap:wrap; }
  .radio-opt {
    flex:1; min-width:80px;
    padding:10px 8px; border-radius:8px;
    border:1.5px solid var(--border); background:var(--cream);
    text-align:center; font-size:0.88rem; font-weight:500; color:var(--text);
    cursor:pointer; transition:all 0.15s;
  }
  .radio-opt.selected, .radio-opt:hover { border-color:var(--gold); background:var(--gold-pale); color:var(--navy); font-weight:600; }
  .form-section-label { font-size:0.72rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin:22px 0 14px; border-top:1px solid var(--border); padding-top:18px; }
  .health-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .health-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; border-radius:8px;
    border:1.5px solid var(--border); background:var(--cream);
    cursor:pointer; transition:all 0.15s; font-size:0.88rem; color:var(--text);
  }
  .health-item.selected { border-color:var(--navy); background:#EDF0F8; color:var(--navy); font-weight:600; }
  .health-item input[type="checkbox"] { accent-color:var(--navy); width:15px; height:15px; cursor:pointer; }
  .submit-preapp { width:100%; padding:15px; font-size:1rem; border-radius:8px; background:var(--navy); color:var(--white); font-weight:600; font-family:var(--font-body); border:none; cursor:pointer; transition:all 0.2s; margin-top:8px; }
  .submit-preapp:hover { background:var(--navy-light); transform:translateY(-1px); }
  .submit-preapp:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .preapp-success { text-align:center; padding:24px 0; }
  .preapp-success h3 { color:var(--success); font-family:var(--font-display); margin-bottom:8px; }
  .preapp-success p { font-size:0.9rem; }
  .form-note { font-size:0.72rem; color:var(--text-muted); text-align:center; margin-top:10px; line-height:1.5; }

  /* Calendar modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .modal {
    background:var(--white); border-radius:16px; padding:40px;
    max-width:460px; width:100%; box-shadow:0 24px 80px rgba(0,0,0,0.3);
  }
  .modal h3 { font-family:var(--font-display); color:var(--navy); margin-bottom:8px; }
  .modal p { font-size:0.88rem; margin-bottom:24px; }
  .cal-options { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .cal-btn {
    display:flex; align-items:center; gap:14px;
    padding:14px 18px; border-radius:10px;
    border:1.5px solid var(--border); background:var(--cream);
    font-size:0.95rem; font-weight:500; color:var(--navy);
    cursor:pointer; text-decoration:none; transition:all 0.15s;
  }
  .cal-btn:hover { border-color:var(--gold); background:var(--gold-pale); }
  .cal-btn-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1.1rem; }
  .modal-close { width:100%; padding:12px; border-radius:8px; background:var(--cream); border:1.5px solid var(--border); font-family:var(--font-body); font-weight:600; color:var(--text-muted); cursor:pointer; transition:all 0.15s; }
  .modal-close:hover { border-color:var(--navy); color:var(--navy); }

  /* Footer */
  footer { background:var(--navy-dark); padding:36px 0 24px; border-top:1px solid rgba(255,255,255,0.07); margin-top:80px; }
  .footer-inner { text-align:center; display:flex; flex-direction:column; gap:16px; align-items:center; }
  .footer-brand { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--white); }
  .footer-sub { font-size:0.68rem; font-weight:600; color:var(--gold); letter-spacing:0.12em; text-transform:uppercase; }
  .footer-disclaimer { max-width:780px; font-size:0.7rem; color:rgba(255,255,255,0.28); line-height:1.7; border-top:1px solid rgba(255,255,255,0.07); padding-top:20px; }

  /* Scroll reveal */
  .reveal { opacity:0; transform:translateY(24px); transition:opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Icons ───────────────────────────────────────────────────────────────────
const PhoneIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .99h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
  </svg>
);
const CheckIcon = () => (
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <path d="M5 14l6 6 12-12" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);
const CalIcon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
);
const IdIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
  </svg>
);
const HeartIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
  </svg>
);
const DollarIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
  </svg>
);
const UserIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
  </svg>
);
const SunIcon = () => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
);
const BoltIcon = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </svg>
);

// ─── Countdown Timer ──────────────────────────────────────────────────────────
const TOTAL = 15 * 60; // 15 minutes in seconds

function Countdown() {
  const [secs, setSecs] = useState(() => {
    const saved = localStorage.getItem('sf_countdown_start');
    if (saved) {
      const elapsed = Math.floor((Date.now() - parseInt(saved)) / 1000);
      return Math.max(0, TOTAL - elapsed);
    }
    localStorage.setItem('sf_countdown_start', Date.now().toString());
    return TOTAL;
  });

  useEffect(() => {
    if (secs <= 0) return;
    const id = setInterval(() => setSecs(s => Math.max(0, s - 1)), 1000);
    return () => clearInterval(id);
  }, [secs]);

  const mins = Math.floor(secs / 60);
  const s = secs % 60;
  const pct = secs / TOTAL;
  const circumference = 188;
  const offset = circumference * (1 - pct);

  return (
    <div className="countdown-card">
      <div className="countdown-ring">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="30" className="" style={{fill:'none',stroke:'rgba(200,148,58,0.2)',strokeWidth:5}}/>
          <circle cx="35" cy="35" r="30" className="progress"
            style={{fill:'none',stroke:'var(--gold)',strokeWidth:5,strokeLinecap:'round',
              strokeDasharray:188,strokeDashoffset:offset,transition:'stroke-dashoffset 1s linear',
              transform:'rotate(-90deg)',transformOrigin:'35px 35px'}}/>
        </svg>
        <div className="countdown-num">
          {secs > 0 ? <>{mins}:{String(s).padStart(2,'0')}<span>min</span></> : <span style={{fontSize:'0.6rem',textAlign:'center',padding:'0 4px'}}>Agent calling now!</span>}
        </div>
      </div>
      <div className="countdown-text">
        <div className="countdown-label">{secs > 0 ? 'Estimated Wait' : 'Your agent is'}</div>
        <div className="countdown-desc">
          {secs > 0
            ? <>Your agent will call within <strong style={{color:'var(--gold-light)'}}>15 minutes</strong><br/>during business hours</>
            : <strong style={{color:'var(--gold-light)'}}>calling you right now!</strong>
          }
        </div>
      </div>
    </div>
  );
}

// ─── Calendar Modal ───────────────────────────────────────────────────────────
function CalendarModal({ onClose }) {
  const name = 'Agent Call – Sunrise Final Expense';
  const desc = 'A licensed Arizona agent will call to discuss your free final expense quote. Have your ID and beneficiary info handy. Call (505) 504-3101 with questions.';
  const start = new Date(Date.now() + 20 * 60 * 1000);
  const end = new Date(start.getTime() + 30 * 60 * 1000);
  const fmt = d => d.toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';

  const gcal = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(name)}&details=${encodeURIComponent(desc)}&dates=${fmt(start)}/${fmt(end)}`;
  const ics = () => {
    const data = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nSUMMARY:${name}\nDESCRIPTION:${desc}\nEND:VEVENT\nEND:VCALENDAR`;
    const blob = new Blob([data], { type: 'text/calendar' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'agent-call.ics'; a.click();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h3 style={{marginBottom:6}}>Add to Calendar</h3>
        <p>Block time for your upcoming agent call so you don't miss it.</p>
        <div className="cal-options">
          <a href={gcal} target="_blank" rel="noopener" className="cal-btn">
            <div className="cal-btn-icon" style={{background:'#E8F0FE'}}>
              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12s4.48 10 10 10 10-4.48 10-10zm-10 1H8v-2h4V8l4 4-4 4v-3z"/></svg>
            </div>
            Google Calendar
          </a>
          <button className="cal-btn" onClick={ics}>
            <div className="cal-btn-icon" style={{background:'#F5F5F7'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            Apple / Outlook (.ics)
          </button>
        </div>
        <button className="modal-close" onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

// ─── Pre-Application Form ─────────────────────────────────────────────────────
const healthConditions = [
  'Heart Disease / Attack','COPD / Emphysema','Diabetes (Type 1 or 2)',
  'Stroke / TIA','Cancer (within 5 yrs)','Kidney Disease','HIV / AIDS',
  'Currently in Nursing Home','None of the Above',
];

function PreAppForm() {
  const [form, setForm] = useState({
    smoker: '', height: '', weight: '', beneficiary: '', relationship: '',
    medications: '', conditions: [], coverageGoal: '', additionalNotes: '',
  });
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);

  const toggleCondition = (c) => {
    setForm(f => {
      const has = f.conditions.includes(c);
      if (c === 'None of the Above') return {...f, conditions: has ? [] : ['None of the Above']};
      const filtered = f.conditions.filter(x => x !== 'None of the Above');
      return {...f, conditions: has ? filtered.filter(x=>x!==c) : [...filtered, c]};
    });
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { setLoading(false); setSubmitted(true); }, 1000);
  };

  if (submitted) return (
    <div className="preapp-success">
      <div style={{width:60,height:60,borderRadius:'50%',background:'var(--success)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
        <CheckIcon />
      </div>
      <h3>Pre-Application Received!</h3>
      <p style={{marginTop:8}}>Your agent has your information and can move quickly when they call. This typically <strong>cuts your call time in half.</strong></p>
    </div>
  );

  return (
    <form onSubmit={handleSubmit}>
      {/* Tobacco */}
      <div className="form-field">
        <label>Do you use tobacco or nicotine products?</label>
        <div className="radio-group">
          {['No, never','Former user','Yes, current'].map(opt => (
            <div key={opt} className={`radio-opt${form.smoker===opt?' selected':''}`} onClick={() => setForm({...form, smoker: opt})}>
              {opt}
            </div>
          ))}
        </div>
      </div>

      {/* Height / Weight */}
      <div className="form-row-2">
        <div className="form-field">
          <label>Height</label>
          <select value={form.height} onChange={e=>setForm({...form, height:e.target.value})}>
            <option value="">Select...</option>
            {["4'8\"","4'9\"","4'10\"","4'11\"","5'0\"","5'1\"","5'2\"","5'3\"","5'4\"","5'5\"","5'6\"","5'7\"","5'8\"","5'9\"","5'10\"","5'11\"","6'0\"","6'1\"","6'2\"","6'3\"","6'4\""].map(h=><option key={h}>{h}</option>)}
          </select>
        </div>
        <div className="form-field">
          <label>Weight (lbs)</label>
          <input type="number" placeholder="e.g. 165" value={form.weight} onChange={e=>setForm({...form, weight:e.target.value})} min="80" max="500"/>
        </div>
      </div>

      {/* Coverage Goal */}
      <div className="form-field">
        <label>Primary goal for coverage</label>
        <div className="radio-group">
          {['Funeral costs','Pay off debts','Leave inheritance','All of the above'].map(opt=>(
            <div key={opt} className={`radio-opt${form.coverageGoal===opt?' selected':''}`} onClick={()=>setForm({...form,coverageGoal:opt})}>
              {opt}
            </div>
          ))}
        </div>
      </div>

      {/* Health */}
      <div className="form-section-label">Health History</div>
      <p style={{fontSize:'0.82rem',color:'var(--text-muted)',marginBottom:14}}>Check any that apply. <strong>All plans have options regardless of health history.</strong></p>
      <div className="health-grid">
        {healthConditions.map(c=>(
          <label key={c} className={`health-item${form.conditions.includes(c)?' selected':''}`}>
            <input type="checkbox" checked={form.conditions.includes(c)} onChange={()=>toggleCondition(c)} />
            {c}
          </label>
        ))}
      </div>

      {/* Beneficiary */}
      <div className="form-section-label">Beneficiary</div>
      <div className="form-row-2">
        <div className="form-field">
          <label>Beneficiary Full Name</label>
          <input type="text" placeholder="Jane Johnson" value={form.beneficiary} onChange={e=>setForm({...form,beneficiary:e.target.value})} />
        </div>
        <div className="form-field">
          <label>Relationship to You</label>
          <select value={form.relationship} onChange={e=>setForm({...form,relationship:e.target.value})}>
            <option value="">Select...</option>
            {['Spouse','Child','Grandchild','Sibling','Parent','Friend','Other'].map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
      </div>

      {/* Medications */}
      <div className="form-field">
        <label>Current prescriptions <span style={{fontWeight:400,color:'var(--text-muted)'}}>(optional — helps us find best rates)</span></label>
        <textarea placeholder="e.g. Metformin, Lisinopril, Atorvastatin..." value={form.medications} onChange={e=>setForm({...form,medications:e.target.value})} />
      </div>

      <button type="submit" className="submit-preapp" disabled={loading} style={{background:'var(--gold)',boxShadow:'0 4px 20px rgba(200,148,58,0.35)'}}>
        {loading ? 'Checking your options...' : '✓ Check My Qualification Now'}
      </button>
      <p className="form-note">This information is sent securely to your agent before the call. It is never sold or shared with third parties.</p>
    </form>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

  useEffect(() => {

      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });

    return () => observer.disconnect();

  return (
    <>

              <div className="nav-brand">Sunrise Final Expense</div>

            </div>
          </a>
          <a href="tel:+15055043101" className="nav-phone">
            <PhoneIcon /> (505) 504-3101
          </a>
        </div>
      </nav>

      {/* Confirm Hero */}
      <section className="confirm-hero">
        <div className="container confirm-hero-inner">
          <div className="confirm-badge fade-up">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="6" fill="#6FCFA0"/></svg>
            Request Confirmed
          </div>
          <div className="confirm-check fade-up-2"><CheckIcon /></div>
          <h1 className="fade-up-2">You're on the list,<br/><em>{firstName}!</em></h1>
          <p className="fade-up-3">A licensed Arizona agent will call you shortly. While you wait, we've put together everything you need to make the call quick and easy.</p>
          <Countdown />
          <div className="action-row fade-up-4">
            <a href="tel:+15055043101" className="btn btn-call">
              <PhoneIcon /> Call Now: (505) 504-3101
            </a>
            <button className="btn btn-calendar" onClick={() => setCalOpen(true)}>
              <CalIcon /> Add to Calendar
            </button>
          </div>
        </div>
      </section>

      {/* Main Content */}
      <div className="main-grid">
        {/* Left column */}
        <div>
          {/* What to have ready */}
          <div className="card reveal">
            <div className="card-label">Before the Call</div>
            <h2>What to Have Ready</h2>
            <p style={{marginBottom:24,fontSize:'0.92rem'}}>Having these items on hand helps your agent find your best rate faster — most calls take <strong>under 15 minutes</strong>.</p>
            <ul className="ready-list">
              {[
                { Icon: IdIcon, title: 'Government-Issued ID', desc: "Driver's license, state ID, or passport. We'll need your full legal name and date of birth." },
                { Icon: HeartIcon, title: 'Basic Health Info', desc: 'A general sense of any major diagnoses and your current medications. No records needed — just conversational.' },
                { Icon: UserIcon, title: 'Beneficiary Name', desc: 'The full legal name of the person who will receive the benefit — usually a spouse, child, or trusted family member.' },

              ].map(({ Icon, title, desc }, i) => (
                <li key={i} className="ready-item">
                  <div className="ready-icon"><Icon /></div>
                  <div className="ready-item-text">
                    <strong>{title}</strong>
                    <span>{desc}</span>
                  </div>
                </li>
              ))}
            </ul>
          </div>

          {/* Carriers */}
          <div className="carriers-card reveal">
            <div className="card-label" style={{marginBottom:6}}>Our Trusted Carriers</div>
            <h4>We Shop the Best Rates For You</h4>
            <p>We work with Arizona's top-rated final expense carriers to find you the lowest available rate — often in a single call.</p>
            <div className="carrier-list">
              {['Mutual of Omaha','Ethos Life','American Amicable','Transamerica','Aetna'].map(c => (
                <div key={c} className="carrier-chip">
                  <div className="carrier-dot"></div>
                  {c}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Right column — Pre-App */}
        <div>
          <div className="preapp-card reveal">
            <div className="preapp-badge"><BoltIcon /> Free Carrier Qualification Check</div>
            <h2>See If You Qualify for the Best Rates</h2>
            <p>We shop <strong>Mutual of Omaha, Ethos, American Amicable, Transamerica &amp; Aetna</strong> — your health profile determines which carrier gives you the lowest rate. Answer a few questions now and your agent will arrive ready with your best options.</p>
            {!preAppOpen ? (
              <>
                <button className="submit-preapp" style={{marginTop:0,background:'var(--gold)',boxShadow:'0 4px 20px rgba(200,148,58,0.35)'}} onClick={() => setPreAppOpen(true)}>
                  ✓ See If I Qualify — Takes 3 Minutes
                </button>
                <p className="form-note" style={{marginTop:12}}>No obligation. Your agent reviews results before the call.</p>
              </>
            ) : (
              <PreAppForm />
            )}
          </div>
        </div>
      </div>

      {/* Footer */}
      <footer>
        <div className="container">
          <div className="footer-inner">
            <div>
              <div className="footer-brand">Sunrise Final Expense</div>
              <div className="footer-sub">Licensed in the State of Arizona</div>
            </div>
            <div className="footer-disclaimer">
              Sunrise Final Expense is a licensed insurance agency operating in the State of Arizona. License #[AZ-XXXXXXXX]. Final expense insurance products are underwritten by third-party carriers including Mutual of Omaha, Ethos, American Amicable, Transamerica, and Aetna. Coverage, premiums, and eligibility vary by carrier and individual health profile. This page is for informational purposes only. © 2026 Sunrise Final Expense. All rights reserved.
            </div>
          </div>
        </div>
      </footer>

      {calOpen && <CalendarModal onClose={() => setCalOpen(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<div id="root"></div>
</body>
